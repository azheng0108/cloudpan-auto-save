<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建任务 - 完整版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 自定义滚动条样式，让长页面滚动更美观 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #999;
        }
        
        /* 统一输入框聚焦样式 */
        .input-focus:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
        }

        /* 目录选择成功动画 */
        @keyframes successPulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); border-color: #22c55e; }
            70% { box-shadow: 0 0 0 4px rgba(34, 197, 94, 0); border-color: transparent; }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .animate-success {
            animation: successPulse 0.8s ease-out forwards !important;
            border-color: #22c55e !important;
        }
        .text-success {
            color: #22c55e !important;
        }
    </style>
</head>
<body class="bg-gray-200 min-h-screen p-4 md:p-8 font-sans text-gray-800 flex items-center justify-center">

    <!-- 弹窗容器 -->
    <div class="w-full max-w-3xl bg-white rounded-lg shadow-xl overflow-hidden flex flex-col" style="max-height: 90vh;">
        
        <!-- 弹窗头部 -->
        <div class="px-6 py-4 border-b border-gray-100">
            <h2 class="text-xl font-bold text-gray-800">创建任务</h2>
        </div>

        <!-- 弹窗主体内容 (可滚动) -->
        <div class="px-6 py-5 overflow-y-auto custom-scrollbar space-y-6 flex-1">
            
            <!-- 1. 选择账号 -->
            <div>
                <label class="block text-[15px] font-medium text-gray-700 mb-1.5">选择账号</label>
                <div class=" relative">
                    <select class="w-full px-3 py-2 border border-gray-300 rounded text-sm appearance-none input-focus bg-white">
                        <option value="159">159</option>
                        <option value="other">其他账号...</option>
                    </select>
                    <i data-lucide="chevron-down" class="w-4 h-4 text-gray-500 absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none"></i>
                </div>
            </div>

            <!-- 2. 分享链接 -->
            <div>
                <label class="block text-[15px] font-medium text-gray-700 mb-1.5">分享链接</label>
                <div class="flex gap-3">
                    <div class="flex-1 flex items-center border border-gray-300 rounded bg-white overflow-hidden focus-within:border-blue-500 focus-within:ring-2 focus-within:ring-blue-100 transition-all">
                        <span class="pl-3 pr-1 text-sm text-gray-500 whitespace-nowrap">链接:</span>
                        <input type="text" value="https://yun.139.com/shareweb/#/w/i/2tQE9wuoxj5k" class="w-full px-2 py-2 text-sm outline-none">
                    </div>
                    <div class="w-28 flex items-center border border-gray-300 rounded bg-white overflow-hidden focus-within:border-blue-500 focus-within:ring-2 focus-within:ring-blue-100 transition-all">
                        <input type="text" value="yiwf" class="w-full px-3 py-2 text-sm outline-none" placeholder="提取码">
                    </div>
                </div>
            </div>

            <!-- 3. 任务名称 -->
            <div>
                <label class="block text-[15px] font-medium text-gray-700 mb-1.5">任务名称</label>
                <input type="text" value="test" class="w-full px-3 py-2 border border-gray-300 rounded text-sm input-focus transition-all">
                <p class="mt-1.5 text-xs text-gray-500">默认使用分享目录第一个文件夹名称，识别完成后可更改</p>
            </div>

            <!-- 4. 分享目录树 (完美还原截图并优化“小白”文案) -->
            <div>
                <label class="block text-[15px] font-medium text-gray-700 mb-1.5">分享目录</label>
                <div class="border border-gray-200 rounded-md bg-white">
                    
                    <!-- 顶层全部内容 -->
                    <div class="flex items-center gap-2 p-2.5 border-b border-gray-100 hover:bg-gray-50 transition-colors">
                        <input type="checkbox" id="checkAll" class="w-4 h-4 text-blue-600 rounded border-gray-300">
                        <label for="checkAll" class="text-sm font-bold text-gray-800 flex items-center gap-1.5 cursor-pointer select-none">
                            <i data-lucide="folder-open" class="w-4 h-4 text-yellow-500 fill-yellow-100"></i>
                            test（全部内容）
                        </label>
                    </div>

                    <!-- 子目录区域 -->
                    <div class="py-2 pl-8 space-y-2">
                        <!-- 优化：将生硬的术语改为大白话，并弱化标签的视觉冲击力 -->
                        <div class="flex items-center gap-2 hover:bg-gray-50 p-1.5 rounded transition-colors">
                            <input type="checkbox" id="looseFiles" class="folder-check w-4 h-4 text-blue-600 rounded border-gray-300">
                            <label for="looseFiles" class="text-sm text-gray-700 flex flex-wrap items-center gap-2 cursor-pointer select-none">
                                <span class="flex items-center gap-1.5 font-medium text-gray-800">
                                    <i data-lucide="file" class="w-4 h-4 text-gray-400"></i>
                                    当前外层的文件
                                </span>
                                <!-- 改为灰色幽灵标签，不抢戏，但解释得很清楚 -->
                                <span class="bg-gray-50 text-gray-500 text-[11px] px-1.5 py-0.5 rounded border border-gray-200">
                                    不包含里面的文件夹
                                </span>
                            </label>
                        </div>
                        
                        <!-- 常规文件夹 -->
                        <div class="flex items-center gap-2 hover:bg-gray-50 p-1.5 rounded transition-colors">
                            <input type="checkbox" class="folder-check w-4 h-4 text-blue-600 rounded border-gray-300">
                            <label class="text-sm text-gray-700 flex items-center gap-1.5 cursor-pointer select-none">
                                <i data-lucide="folder" class="w-4 h-4 text-yellow-500 fill-yellow-100"></i>
                                3
                            </label>
                        </div>
                        <div class="flex items-center gap-2 hover:bg-gray-50 p-1 rounded transition-colors">
                            <input type="checkbox" class="folder-check w-4 h-4 text-blue-600 rounded border-gray-300">
                            <label class="text-sm text-gray-700 flex items-center gap-1.5 cursor-pointer select-none">
                                <i data-lucide="folder" class="w-4 h-4 text-yellow-500 fill-yellow-100"></i>
                                2
                            </label>
                        </div>
                        <div class="flex items-center gap-2 hover:bg-gray-50 p-1 rounded transition-colors">
                            <input type="checkbox" class="folder-check w-4 h-4 text-blue-600 rounded border-gray-300">
                            <label class="text-sm text-gray-700 flex items-center gap-1.5 cursor-pointer select-none">
                                <i data-lucide="folder" class="w-4 h-4 text-yellow-500 fill-yellow-100"></i>
                                1
                            </label>
                        </div>
                    </div>

                    <!-- 底部提示 -->
                    <div class="p-2.5 bg-gray-50 border-t border-gray-100 text-xs text-gray-600 flex items-center gap-1.5">
                        <span class="text-yellow-500 text-sm">💡</span>
                        每个选中的子目录将递归同步其所有内部文件（含嵌套子目录）
                    </div>
                </div>
            </div>

            <!-- 5. 保存目录 (恢复一键常用目录，并统一扁平化UI风格) -->
            <div>
                <label class="block text-[15px] font-medium text-gray-700 mb-1.5">保存目录</label>
                <div class="flex gap-3 relative">
                    <!-- 左侧：输入框 (点击弹出选择树) -->
                    <div class="flex-1 relative cursor-pointer" onclick="openDirModal()">
                        <input type="text" id="saveDirInput" readonly value="/自动转存文件夹" class="w-full px-3 py-2 bg-white border border-gray-300 rounded text-sm cursor-pointer hover:border-blue-400 focus:outline-none focus:ring-2 focus:ring-blue-100 transition-all text-gray-700 select-none">
                    </div>
                    
                    <!-- 右侧：常用目录按钮 (带下拉菜单一键直达) -->
                    <div class="relative">
                        <button onclick="toggleCommonMenu(event)" class="px-4 py-2 bg-white border border-gray-300 rounded text-sm text-gray-700 hover:bg-gray-50 hover:text-blue-600 transition-colors whitespace-nowrap flex items-center gap-1.5">
                            常用目录
                            <i data-lucide="chevron-down" class="w-3.5 h-3.5 text-gray-400"></i>
                        </button>
                        
                        <!-- 常用目录下拉菜单 -->
                        <div id="commonMenu" class="hidden absolute right-0 top-full mt-1 w-40 bg-white border border-gray-200 rounded shadow-lg z-20 py-1 origin-top-right transform transition-all">
                            <div class="px-3 py-2 text-sm text-gray-700 hover:bg-blue-50 hover:text-[#1677ff] cursor-pointer transition-colors" onclick="quickSelectDir('/同步盘')">同步盘</div>
                            <div class="px-3 py-2 text-sm text-gray-700 hover:bg-blue-50 hover:text-[#1677ff] cursor-pointer transition-colors" onclick="quickSelectDir('/我的应用收藏')">我的应用收藏</div>
                            <div class="px-3 py-2 text-sm text-gray-700 hover:bg-blue-50 hover:text-[#1677ff] cursor-pointer transition-colors" onclick="quickSelectDir('/工作文档')">工作文档</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 6. 总集数 -->
            <div>
                <label class="block text-[15px] font-medium text-gray-700 mb-1.5">总集数</label>
                <input type="number" class="w-full px-3 py-2 border border-gray-300 rounded text-sm input-focus transition-all">
            </div>

            <!-- 7. 备注 -->
            <div>
                <label class="block text-[15px] font-medium text-gray-700 mb-1.5">备注</label>
                <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded text-sm input-focus transition-all">
            </div>

            <!-- 8. 文件名重命名 -->
            <div>
                <label class="block text-[15px] font-medium text-gray-700 mb-1.5">文件名重命名（可选）</label>
                <div class="flex gap-3 mb-1.5">
                    <input type="text" placeholder="正则表达式 例如: .*(\S\d{1,3}E\d{1,3}).*?(\.\w+)$" class="flex-1 px-3 py-2 border border-gray-300 rounded text-sm input-focus font-mono text-xs">
                    <input type="text" placeholder="例如: 沙尘暴.$1$2" class="flex-1 px-3 py-2 border border-gray-300 rounded text-sm input-focus font-mono text-xs">
                </div>
                <a href="#" class="text-xs text-gray-500 underline hover:text-blue-500 transition-colors">显示帮助</a>
            </div>

            <!-- 9. 文件名匹配规则 -->
            <div>
                <label class="block text-[15px] font-medium text-gray-700 mb-1.5">文件名匹配规则（可选）</label>
                <div class="flex gap-3 mb-1.5">
                    <input type="text" placeholder="正则表达式 例如: (?<=E)\d+" class="flex-[2] px-3 py-2 border border-gray-300 rounded text-sm input-focus font-mono text-xs">
                    <div class="flex-[1] relative">
                        <select class="w-full px-3 py-2 border border-gray-300 rounded text-sm appearance-none input-focus bg-white">
                            <option>小于</option>
                            <option>等于</option>
                            <option>大于</option>
                        </select>
                        <i data-lucide="chevron-down" class="w-4 h-4 text-gray-500 absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none"></i>
                    </div>
                    <input type="text" placeholder="值" class="flex-[1] px-3 py-2 border border-gray-300 rounded text-sm input-focus">
                </div>
                <a href="#" class="text-xs text-gray-500 underline hover:text-blue-500 transition-colors">显示帮助</a>
            </div>

            <!-- 10. 定时任务开关 -->
            <div class="pt-2">
                <label class="flex items-center gap-2 cursor-pointer group">
                    <input type="checkbox" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                    <span class="text-[15px] text-gray-700 group-hover:text-blue-600 transition-colors">启用自定义定时任务</span>
                </label>
            </div>

        </div>

        <!-- 弹窗底部按钮 -->
        <div class="px-6 py-4 border-t border-gray-100 bg-gray-50 flex justify-end gap-3">
            <button class="px-6 py-2 border border-gray-300 bg-white rounded text-sm text-gray-700 hover:bg-gray-50 transition-colors shadow-sm">
                取消
            </button>
            <button class="px-6 py-2 bg-[#1677ff] text-white rounded text-sm hover:bg-blue-500 transition-colors shadow-sm">
                创建
            </button>
        </div>
        
    </div>

    <!-- 模拟弹出的目录选择器 (完美复刻 image_d7fb63.png 的清爽线框风格) -->
    <div id="dirModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50 transition-opacity opacity-0 duration-200">
        <!-- 点击背景蒙版关闭 -->
        <div class="absolute inset-0" onclick="closeDirModal()"></div>
        
        <div class="bg-white rounded-lg shadow-xl w-[400px] overflow-hidden flex flex-col transform transition-transform scale-95 duration-200 relative z-10" id="dirModalContent">
            <!-- 头部 -->
            <div class="px-5 py-4 flex justify-between items-center bg-white border-b border-gray-100">
                <h3 class="text-[16px] font-bold text-gray-800">选择保存目录</h3>
                <button onclick="closeDirModal()" class="text-gray-400 hover:text-gray-600 transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            
            <!-- 树状列表 -->
            <div class="px-4 py-3 h-[300px] overflow-y-auto custom-scrollbar">
                
                <!-- 顶层 -->
                <div class="dir-item flex items-center gap-2.5 p-1.5 rounded cursor-pointer transition-colors text-gray-700 hover:bg-gray-50" data-path="/">
                    <i data-lucide="folder" class="w-[18px] h-[18px] text-yellow-500 folder-icon"></i>
                    <span class="text-[14px]">全部文件</span>
                </div>
                
                <!-- 子层级容器 (带左侧连接线) -->
                <div class="ml-2.5 pl-4 mt-1 space-y-1 relative border-l border-gray-200">
                    
                    <div class="dir-item flex items-center gap-2.5 p-1.5 rounded cursor-pointer transition-colors text-gray-700 hover:bg-gray-50 relative before:content-[''] before:absolute before:-left-4 before:top-1/2 before:w-3 before:h-px before:bg-gray-200" data-path="/我的视频">
                        <i data-lucide="folder" class="w-[18px] h-[18px] text-yellow-500 folder-icon"></i>
                        <span class="text-[14px]">我的视频</span>
                    </div>
                    
                    <!-- 默认高亮的选中状态 (浅蓝底色 + 蓝字) -->
                    <div class="dir-item bg-[#f0f7ff] flex items-center gap-2.5 p-1.5 rounded cursor-pointer transition-colors text-[#1677ff] relative before:content-[''] before:absolute before:-left-4 before:top-1/2 before:w-3 before:h-px before:bg-gray-200" data-path="/自动转存文件夹">
                        <i data-lucide="folder" class="w-[18px] h-[18px] text-[#1677ff] folder-icon"></i>
                        <span class="text-[14px]">自动转存文件夹</span>
                    </div>
                    
                    <div class="dir-item flex items-center gap-2.5 p-1.5 rounded cursor-pointer transition-colors text-gray-700 hover:bg-gray-50 relative before:content-[''] before:absolute before:-left-4 before:top-1/2 before:w-3 before:h-px before:bg-gray-200" data-path="/工作文档">
                        <i data-lucide="folder" class="w-[18px] h-[18px] text-yellow-500 folder-icon"></i>
                        <span class="text-[14px]">工作文档</span>
                    </div>

                </div>
            </div>
            
            <!-- 底部按钮区 -->
            <div class="px-5 py-3 bg-white flex justify-between items-center border-t border-gray-100">
                <button class="text-[14px] text-[#1677ff] hover:text-blue-600 flex items-center gap-1.5 transition-colors">
                    <i data-lucide="folder-plus" class="w-[18px] h-[18px]"></i>新建文件夹
                </button>
                <div class="flex gap-2">
                    <button onclick="closeDirModal()" class="px-5 py-1.5 border border-gray-300 bg-white rounded text-[14px] text-gray-700 hover:bg-gray-50 transition-colors">取消</button>
                    <button onclick="confirmDirModal()" class="px-5 py-1.5 bg-[#1677ff] text-white rounded text-[14px] hover:bg-blue-600 transition-colors">确定</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // 简单的全选/反选逻辑联动
        const checkAll = document.getElementById('checkAll');
        const folderChecks = document.querySelectorAll('.folder-check');

        checkAll.addEventListener('change', (e) => {
            folderChecks.forEach(check => {
                check.checked = e.target.checked;
            });
        });

        folderChecks.forEach(check => {
            check.addEventListener('change', () => {
                const allChecked = Array.from(folderChecks).every(c => c.checked);
                const someChecked = Array.from(folderChecks).some(c => c.checked);
                checkAll.checked = allChecked;
                checkAll.indeterminate = someChecked && !allChecked;
            });
        });

        // ================= 一键常用目录交互 =================
        const commonMenu = document.getElementById('commonMenu');
        
        function toggleCommonMenu(e) {
            e.stopPropagation(); // 阻止事件冒泡，防止触发 document 点击关闭
            commonMenu.classList.toggle('hidden');
        }

        // 点击空白处关闭常用目录菜单
        document.addEventListener('click', (e) => {
            if (!commonMenu.contains(e.target) && !e.target.closest('button[onclick="toggleCommonMenu(event)"]')) {
                commonMenu.classList.add('hidden');
            }
        });

        // 快速选择并更新输入框
        function quickSelectDir(path) {
            const saveDirInput = document.getElementById('saveDirInput');
            if (saveDirInput.value !== path) {
                saveDirInput.value = path;
                // 触发一个简单的绿框成功反馈动画
                saveDirInput.classList.add('animate-success');
                setTimeout(() => {
                    saveDirInput.classList.remove('animate-success');
                }, 800);
            }
            commonMenu.classList.add('hidden');
        }


        // ================= 目录选择器交互逻辑 =================
        const dirModal = document.getElementById('dirModal');
        const dirModalContent = document.getElementById('dirModalContent');
        const saveDirInput = document.getElementById('saveDirInput');
        let tempSelectedPath = saveDirInput.value; 

        function openDirModal() {
            dirModal.classList.remove('hidden');
            dirModal.classList.add('flex');
            requestAnimationFrame(() => {
                dirModal.classList.remove('opacity-0');
                dirModalContent.classList.remove('scale-95');
                dirModalContent.classList.add('scale-100');
            });
        }

        function closeDirModal() {
            dirModal.classList.add('opacity-0');
            dirModalContent.classList.remove('scale-100');
            dirModalContent.classList.add('scale-95');
            setTimeout(() => {
                dirModal.classList.add('hidden');
                dirModal.classList.remove('flex');
            }, 200);
        }

        // 绑定扁平风格目录树的点击事件
        document.querySelectorAll('.dir-item').forEach(item => {
            item.addEventListener('click', function(e) {
                // 1. 重置所有项为默认灰字、黄文件夹、透明背景
                document.querySelectorAll('.dir-item').forEach(el => {
                    el.classList.remove('bg-[#f0f7ff]', 'text-[#1677ff]');
                    el.classList.add('text-gray-700', 'hover:bg-gray-50');
                    
                    const icon = el.querySelector('.folder-icon');
                    if(icon) {
                        icon.classList.remove('text-[#1677ff]');
                        icon.classList.add('text-yellow-500');
                    }
                });
                
                // 2. 将当前点击项设为高亮 (浅蓝背景、蓝字、蓝文件夹)
                this.classList.remove('text-gray-700', 'hover:bg-gray-50');
                this.classList.add('bg-[#f0f7ff]', 'text-[#1677ff]');
                
                const activeIcon = this.querySelector('.folder-icon');
                if(activeIcon) {
                    activeIcon.classList.remove('text-yellow-500');
                    activeIcon.classList.add('text-[#1677ff]');
                }
                
                tempSelectedPath = this.getAttribute('data-path');
            });
        });

        function confirmDirModal() {
            closeDirModal();
            if (saveDirInput.value !== tempSelectedPath) {
                saveDirInput.value = tempSelectedPath;
                saveDirInput.classList.add('animate-success');
                setTimeout(() => {
                    saveDirInput.classList.remove('animate-success');
                }, 800);
            }
        }
    </script>
</body>
</html>
